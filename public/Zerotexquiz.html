<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>妳的內著穿搭運勢｜ZERO-TEX</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1714;
  --paper: #f7f4ef;
  --warm: #e8e2d9;
  --accent: #8b6f5e;
  --black: #1C1C1A;
  --skin: #C4A882;
  --gray: #888780;
  --mono: 'DM Mono', monospace;
}

@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');

background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  padding: 0;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── INTRO ── */
#screen-intro {
  background: var(--ink);
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
}

.intro-logo {
  height: 24px;
  margin-bottom: 40px;
  opacity: .9;
}

.intro-series {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .25em;
  color: var(--skin);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.intro-title {
  font-size: 26px;
  font-weight: 300;
  color: #f0ebe3;
  line-height: 1.5;
  margin-bottom: 12px;
  letter-spacing: .02em;
}

.intro-sub {
  font-size: 13px;
  color: rgba(240,235,227,.5);
  margin-bottom: 48px;
  line-height: 1.8;
}

.intro-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px;
  background: transparent;
  border: 1px solid rgba(240,235,227,.3);
  color: #f0ebe3;
  font-size: 13px;
  letter-spacing: .1em;
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--mono);
  transition: all .2s;
}
.intro-btn:hover { background: rgba(240,235,227,.08); }

/* ── QUIZ ── */
#screen-quiz { background: var(--paper); padding: 0; }

.quiz-progress {
  background: var(--ink);
  padding: 16px 24px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.quiz-prog-bar {
  flex: 1;
  height: 2px;
  background: rgba(240,235,227,.15);
  border-radius: 1px;
  overflow: hidden;
}

.quiz-prog-fill {
  height: 100%;
  background: var(--skin);
  border-radius: 1px;
  transition: width .4s ease;
}

.quiz-prog-label {
  font-family: var(--mono);
  font-size: 11px;
  color: rgba(240,235,227,.4);
  white-space: nowrap;
}

.quiz-body { display: flex; flex-direction: column; align-items: center; } padding: 32px 24px 40px; flex: 1; }

.quiz-q-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--accent);
  margin-bottom: 14px;
  text-transform: uppercase;
}

.quiz-q-text {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 32px;
}

.quiz-options { display: flex; flex-direction: column; gap: 10px; }

.quiz-option {
  padding: 16px 18px;
  border: 1px solid var(--warm);
  border-radius: 3px;
  background: white;
  cursor: pointer;
  font-size: 14px;
  color: var(--ink);
  text-align: left;
  transition: all .15s;
  line-height: 1.5;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.quiz-option:hover {
  border-color: var(--accent);
  background: #faf7f3;
}

.quiz-option.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: #f0ebe3;
}

.quiz-option .opt-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  flex-shrink: 0;
  padding-top: 2px;
}

.quiz-option.selected .opt-label { color: var(--skin); }

/* ── GATE (綁定牆) ── */
#screen-gate {
  background: var(--ink);
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  text-align: center;
}

.gate-icon {
  width: 56px;
  height: 56px;
  border: 1px solid rgba(240,235,227,.2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 22px;
}

.gate-title {
  font-size: 22px;
  font-weight: 300;
  color: #f0ebe3;
  margin-bottom: 12px;
  line-height: 1.5;
}

.gate-sub {
  font-size: 13px;
  color: rgba(240,235,227,.5);
  margin-bottom: 40px;
  line-height: 1.8;
}

.gate-btn {
  width: 100%;
  max-width: 280px;
  padding: 16px;
  background: var(--skin);
  border: none;
  color: var(--ink);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .08em;
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--mono);
  margin-bottom: 14px;
  transition: opacity .15s;
}
.gate-btn:hover { opacity: .88; }

.gate-skip {
  font-size: 11px;
  color: rgba(240,235,227,.3);
  cursor: pointer;
  font-family: var(--mono);
  letter-spacing: .05em;
  background: none;
  border: none;
  padding: 8px;
}

/* ── RESULT ── */
#screen-result { background: var(--paper); }

.result-hero {
  height: 260px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  padding: 24px;
}

.result-hero-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.result-hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(28,28,26,.85) 40%, transparent);
}

.result-hero-content { position: relative; z-index: 2; }

.result-color-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--skin);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.result-name {
  font-size: 28px;
  font-weight: 300;
  color: #f0ebe3;
  line-height: 1.3;
}

.result-body { display: flex; flex-direction: column; align-items: center; } padding: 28px 24px 40px; }

.result-quote {
  font-size: 15px;
  color: var(--ink);
  line-height: 1.8;
  padding: 20px;
  border-left: 2px solid var(--accent);
  background: white;
  border-radius: 0 3px 3px 0;
  margin-bottom: 24px;
}

.result-desc {
  font-size: 13.5px;
  color: #5a5550;
  line-height: 1.9;
  margin-bottom: 32px;
}

.result-cta-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.result-cta-btn {
  width: 100%;
  padding: 18px;
  background: var(--ink);
  border: none;
  color: #f0ebe3;
  font-size: 14px;
  letter-spacing: .08em;
  cursor: pointer;
  border-radius: 2px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 400;
  margin-bottom: 12px;
  transition: opacity .15s;
}
.result-cta-btn:hover { opacity: .85; }

.result-share-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--warm);
  color: var(--accent);
  font-size: 13px;
  letter-spacing: .05em;
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--mono);
  transition: all .15s;
}
.result-share-btn:hover { border-color: var(--accent); }

/* ── LOADING ── */
#screen-loading {
  background: var(--ink);
  align-items: center;
  justify-content: center;
}

.loading-dot {
  display: flex;
  gap: 8px;
}

.loading-dot span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--skin);
  animation: dotPulse 1.2s ease infinite;
}

.loading-dot span:nth-child(2) { animation-delay: .2s; }
.loading-dot span:nth-child(3) { animation-delay: .4s; }

@keyframes dotPulse {
  0%, 80%, 100% { opacity: .2; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── UTILS ── */
.hidden { display: none !important; }

/* 桌機置中 */
body { display: flex; flex-direction: column; align-items: center; }
.screen { width: 100%; max-width: 480px; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <img class="intro-logo" src="https://raw.githubusercontent.com/enamorai888/enamor-line-bot/main/public/EnamoR-logo-PNG-LOGO-W.png" alt="EnamoR" onerror="this.style.display='none'">
  <div class="intro-series">ZERO-TEX · 萊卡抗菌系列</div>
  <h1 class="intro-title">妳的內著<br>穿搭運勢</h1>
  <p class="intro-sub">5 個問題<br>找出最適合妳的那個色</p>
  <button class="intro-btn" onclick="startQuiz()">開始測驗 →</button>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-progress">
    <div class="quiz-prog-bar">
      <div class="quiz-prog-fill" id="progFill" style="width:0%"></div>
    </div>
    <div class="quiz-prog-label" id="progLabel">1 / 5</div>
  </div>
  <div class="quiz-body">
    <div class="quiz-q-num" id="qNum">Q1</div>
    <div class="quiz-q-text" id="qText"></div>
    <div class="quiz-options" id="qOptions"></div>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen">
  <div class="loading-dot">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- GATE（綁定牆）-->
<div id="screen-gate" class="screen">
  <div class="gate-icon">✦</div>
  <h2 class="gate-title">結果出來了</h2>
  <p class="gate-sub">綁定 EnamoR 會員<br>解鎖妳的專屬色運勢<br>＋本月 1 元體驗資格</p>
  <button class="gate-btn" onclick="doLogin()">綁定會員，查看結果</button>
  <button class="gate-skip" onclick="showResult()">先看看結果就好</button>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-hero">
    <div class="result-hero-bg" id="resultBg"></div>
    <div class="result-hero-overlay"></div>
    <div class="result-hero-content">
      <div class="result-color-tag" id="resultColorTag"></div>
      <div class="result-name" id="resultName"></div>
    </div>
  </div>
  <div class="result-body">
    <div class="result-quote" id="resultQuote"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="result-cta-label">本月專屬體驗</div>
    <button class="result-cta-btn" id="resultCtaBtn" onclick="goCta()">1 元穿上妳的色　→</button>
    <button class="result-share-btn" onclick="shareResult()">分享給朋友測</button>
  </div>
</div>

<script>
// ── QUESTIONS ──
var QUESTIONS = [
  {
    q: '早上起床第一件事？',
    opts: [
      { label: 'A', text: '看手機訊息，掌握今天的節奏', score: 'A' },
      { label: 'B', text: '發呆幾分鐘，讓自己慢慢醒來', score: 'B' },
      { label: 'C', text: '直接起身，今天的事今天做', score: 'C' }
    ]
  },
  {
    q: '妳的包包裡一定有？',
    opts: [
      { label: 'A', text: '手帳或備忘錄，計畫清楚才安心', score: 'A' },
      { label: 'B', text: '護手霜或護唇膏，細節決定一切', score: 'B' },
      { label: 'C', text: '耳機，隨時需要自己的空間', score: 'C' }
    ]
  },
  {
    q: '妳最常穿的下半身是？',
    opts: [
      { label: 'A', text: '直筒褲，俐落不費腦', score: 'A' },
      { label: 'B', text: '寬褲或裙，輕鬆有餘裕', score: 'B' },
      { label: 'C', text: '緊身褲，曲線是我的武器', score: 'C' }
    ]
  },
  {
    q: '朋友找妳吃飯，妳會？',
    opts: [
      { label: 'A', text: '馬上答應，社交讓我充電', score: 'A' },
      { label: 'B', text: '先看行程，不想打亂節奏', score: 'B' },
      { label: 'C', text: '看心情，今天狀態好才去', score: 'C' }
    ]
  },
  {
    q: '妳覺得最好的內著條件是？',
    opts: [
      { label: 'A', text: '穿起來沒有存在感，忘記它才對', score: 'A' },
      { label: 'B', text: '觸感要好，每天第一個接觸身體的東西', score: 'B' },
      { label: 'C', text: '服貼不捲邊不位移，穿整天都安心', score: 'C' }
    ]
  }
];

// ── RESULTS ──
var RESULTS = {
  A: {
    color: '黑 · 基本款',
    name: '黑色能量型',
    quote: '妳不需要被看見，但妳知道自己的狀態。',
    desc: '黑色不只是顏色，是一種態度。服貼、乾爽、沒有存在感——穿上它的人通常不需要別人注意，因為她自己清楚自己在哪裡。萊卡抗菌無縫，一整天的底氣。',
    bg: '#1C1C1A',
    ctaUrl: 'https://enamorshop.com/collections/vip-secret'
  },
  B: {
    color: '質感膚 · 裸色系',
    name: '細節控質感型',
    quote: '細節控的妳，連內著都不將就。',
    desc: '妳對觸感有要求，對品質有堅持。質感膚不是普通的膚色，是那種看起來若隱若現、摸起來澀澀的高彈力觸感。細節控最懂這種差別。',
    bg: '#C4A882',
    ctaUrl: 'https://enamorshop.com/collections/vip-secret'
  },
  C: {
    color: '灰 · 沉穩色',
    name: '安靜力量型',
    quote: '安靜但有力量，從裡到外都是妳的風格。',
    desc: '灰色是最難駕馭的顏色，也是最有主見的人才會選的顏色。不張揚、不跟風，但穿上去就是一種到位的感覺。服貼包覆，乾爽一整天。',
    bg: '#888780',
    ctaUrl: 'https://enamorshop.com/collections/vip-secret'
  }
};

// ── STATE ──
var currentQ = 0;
var scores = { A: 0, B: 0, C: 0 };
var resultKey = null;
var liffInited = false;
var isLoggedIn = false;

// ── LIFF INIT ──
var LIFF_ID = '1656208126-fpNe2w28'; // 替換成你的 LIFF ID
var BIND_API = 'https://enamor-member.vercel.app/api/liff-bind';

liff.init({ liffId: LIFF_ID }).then(function() {
  liffInited = true;
  isLoggedIn = liff.isLoggedIn();
}).catch(function(e) {
  console.warn('LIFF init failed', e);
});

// ── QUIZ LOGIC ──
function startQuiz() {
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = QUESTIONS[currentQ];
  document.getElementById('qNum').textContent = 'Q' + (currentQ + 1);
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progLabel').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('progFill').style.width = ((currentQ / QUESTIONS.length) * 100) + '%';

  var html = '';
  q.opts.forEach(function(opt) {
    html += '<button class="quiz-option" onclick="selectOpt(this,\'' + opt.score + '\')">' +
      '<span class="opt-label">' + opt.label + '</span>' +
      '<span>' + opt.text + '</span>' +
      '</button>';
  });
  document.getElementById('qOptions').innerHTML = html;
}

function selectOpt(el, score) {
  document.querySelectorAll('.quiz-option').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  scores[score]++;

  setTimeout(function() {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      finishQuiz();
    }
  }, 400);
}

function finishQuiz() {
  // 計算結果
  var max = 0;
  resultKey = 'A';
  ['A','B','C'].forEach(function(k) {
    if (scores[k] > max) { max = scores[k]; resultKey = k; }
  });

  showScreen('loading');
  setTimeout(function() {
    if (isLoggedIn) {
      showResult();
    } else {
      showScreen('gate');
    }
  }, 1800);
}

// ── LOGIN / BIND ──
function doLogin() {
  if (!liffInited) { showResult(); return; }
  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: window.location.href });
    return;
  }
  // 已登入，取 token 送綁定
  var token = liff.getAccessToken();
  fetch(BIND_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ accessToken: token, source: 'quiz_fortune' })
  }).catch(function(e) { console.warn('bind failed', e); });
  isLoggedIn = true;
  showResult();
}

// ── RESULT ──
function showResult() {
  var r = RESULTS[resultKey];
  document.getElementById('resultBg').style.background = r.bg;
  document.getElementById('resultColorTag').textContent = r.color;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultQuote').textContent = r.quote;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultCtaBtn').textContent = '1 元穿上妳的色　→';
  showScreen('result');
}

function goCta() {
  var r = RESULTS[resultKey];
  if (liffInited && liff.isInClient()) {
    liff.openWindow({ url: r.ctaUrl, external: true });
  } else {
    window.open(r.ctaUrl, '_blank');
  }
}

function shareResult() {
  var r = RESULTS[resultKey];
  var msg = '我的內著穿搭運勢是「' + r.name + '」\n' + r.quote + '\n快來測測妳的 → ' + window.location.href;
  if (liffInited && liff.isInClient()) {
    liff.shareTargetPicker([{ type: 'text', text: msg }]).catch(function(){});
  } else {
    navigator.share ? navigator.share({ text: msg }) : alert('分享連結：' + window.location.href);
  }
}

// ── SCREEN ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + id).classList.add('active');
}
</script>
</body>
</html>
