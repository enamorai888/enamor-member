<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員綁定 — EnamoR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F6F1;
      --card-bg:  #EFE9DD;
      --ink:      #2A2825;
      --ink-2:    #6B6760;
      --accent:   #8B6F47;
      --accent-lt:#C4A882;
      --white:    #FFFFFF;
      --radius:   16px;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 32px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .wordmark {
      text-align: center;
      margin-bottom: 4px;
    }
    .wordmark-en {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .hero-photo {
      width: 100%;
      aspect-ratio: 1 / 0.72;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      position: relative;
    }
    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .title-block {
      text-align: center;
    }
    .title-main {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
    }
    .title-sub {
      display: inline-block;
      background: var(--ink);
      color: var(--bg);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 20px;
      line-height: 1.5;
    }

    .benefits {
      background: var(--card-bg);
      border: 1.5px solid var(--accent-lt);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .benefit-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 15px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.6;
    }
    .benefit-num {
      flex-shrink: 0;
      font-weight: 700;
      color: var(--accent);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input[type="email"] {
      width: 100%;
      padding: 16px 18px;
      font-family: inherit;
      font-weight: 400;
      font-size: 15px;
      color: var(--ink);
      background: var(--white);
      border: 1.5px solid #DDD6C8;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="email"]::placeholder { color: #B5B0A6; }
    input[type="email"]:focus { border-color: var(--accent); }

    .btn-bind {
      width: 100%;
      padding: 17px;
      background: var(--ink);
      color: var(--bg);
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-appearance: none;
    }
    .btn-bind:hover:not(:disabled) { background: var(--accent); }
    .btn-bind:active:not(:disabled) { transform: scale(0.98); }
    .btn-bind:disabled { opacity: 0.4; cursor: default; }

    .msg {
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      display: none;
    }
    .msg.visible { display: block; }
    .msg-error { color: #C04848; }
    .msg-info  { color: var(--ink-2); }

    .footer-note {
      text-align: center;
      background: rgba(239, 233, 221, 0.92);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      color: var(--ink-2);
      line-height: 1.5;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 24px);
      white-space: nowrap;
    }

    .success-block {
      display: none;
      text-align: center;
      gap: 16px;
      flex-direction: column;
      align-items: center;
    }
    .success-block.visible { display: flex; }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--accent);
    }
    .success-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }
    .success-sub {
      font-size: 14px;
      color: var(--ink-2);
      line-height: 1.7;
    }
    .btn-vip {
      display: inline-block;
      padding: 16px 40px;
      background: var(--accent);
      color: var(--white);
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      text-decoration: none;
      border-radius: var(--radius);
      transition: background 0.2s;
    }
    .btn-vip:hover { background: var(--accent-lt); }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.3s;
    }
    #loading-overlay.hide {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid #E5DFD0;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  </style>

  <!-- Meta Pixel -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '8168462463242848');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none"
  src="https://www.facebook.com/tr?id=8168462463242848&ev=PageView&noscript=1"
  /></noscript>
  <!-- End Meta Pixel -->
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
</div>

<div class="page">
  <div class="card">

    <div class="wordmark">
      <div class="wordmark-en">EnamoR Official</div>
    </div>

    <div class="hero-photo">
      <img src="https://cdn.shopify.com/s/files/1/0673/5436/1904/files/a7ca85f1-fe49-4fdb-ad76-7cca0b376c03.jpg?v=1782875579" alt="EnamoR 貓咪執行長">
      <div class="footer-note">★ 成功綁定不定期抽貓咪執行長親筆簽名照（電子檔）！</div>
    </div>

    <div class="title-block">
      <div class="title-main">會員綁定</div>
      <div class="title-sub">輸入 Email，將 LINE 與會員資料綁定</div>
    </div>

    <div class="benefits">
      <div class="benefit-item">
        <span class="benefit-num">1.</span>
        <span>每月發送會員限定免費小褲好禮</span>
      </div>
      <div class="benefit-item">
        <span class="benefit-num">2.</span>
        <span>不定期 LINE 專屬神秘優惠</span>
      </div>
      <div class="benefit-item">
        <span class="benefit-num">3.</span>
        <span>活動通知近況不漏接</span>
      </div>
    </div>

    <div id="bind-form">
      <div class="form-group">
        <input
          type="email"
          id="email-input"
          placeholder="your@email.com"
          autocomplete="email"
          inputmode="email"
        >
        <div id="msg-error" class="msg msg-error"></div>
        <div id="msg-info"  class="msg msg-info"></div>
        <button class="btn-bind" id="btn-submit" disabled>確認綁定</button>
      </div>
    </div>

    <div class="success-block" id="success-block">
      <div class="success-icon">✓</div>
      <div class="success-title">綁定完成</div>
      <div class="success-sub">月禮連結已發送到您的 LINE<br>請保持好友狀態以繼續收到禮遇</div>
      <a href="https://enamorshop.com/collections/vip-secret" class="btn-vip">前往會員獨享專區</a>
    </div>

  </div>
</div>

<script>
  const LIFF_ID  = '1656208126-fpNe2w28';
  const BIND_API = 'https://enamor-member.vercel.app/api/liff-bind';
  const VIP_URL  = 'https://enamorshop.com/collections/vip-secret';
  const TRACK    = 'gift';

  // 讀取 UTM source
  const urlParams  = new URLSearchParams(window.location.search);
  const UTM_SOURCE = urlParams.get('utm_source') || 'organic';

  const overlay      = document.getElementById('loading-overlay');
  const emailInput   = document.getElementById('email-input');
  const btnSubmit    = document.getElementById('btn-submit');
  const bindForm     = document.getElementById('bind-form');
  const successBlock = document.getElementById('success-block');
  const msgError     = document.getElementById('msg-error');
  const msgInfo      = document.getElementById('msg-info');

  let lineUID = null;

  function showError(text) {
    msgError.textContent = text;
    msgError.classList.add('visible');
    msgInfo.classList.remove('visible');
  }
  function showInfo(text) {
    msgInfo.textContent = text;
    msgInfo.classList.add('visible');
    msgError.classList.remove('visible');
  }
  function clearMsg() {
    msgError.classList.remove('visible');
    msgInfo.classList.remove('visible');
  }

  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();
      lineUID = profile.userId;

      overlay.classList.add('hide');
      emailInput.disabled = false;
      validateEmail();

    } catch (err) {
      console.error('LIFF init error:', err);
      overlay.classList.add('hide');
      showError('LINE 授權失敗，請關閉後重新開啟連結');
    }
  }

  function validateEmail() {
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailInput.value.trim());
    btnSubmit.disabled = !ok || !lineUID;
    return ok;
  }

  emailInput.addEventListener('input', () => {
    clearMsg();
    validateEmail();
  });

  btnSubmit.addEventListener('click', async () => {
    if (!validateEmail()) return;
    const email = emailInput.value.trim();

    btnSubmit.disabled = true;
    btnSubmit.textContent = '處理中';
    showInfo('綁定中，請稍候...');

    try {
      const res = await fetch(BIND_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email,
          lineUID,
          track: TRACK,
          stage: 'join'
        })
      });
      const data = await res.json();

      if (data.success) {
        // 觸發 Pixel 綁定事件，帶入來源渠道
        if (typeof fbq !== 'undefined') {
          fbq('trackCustom', 'LineBinding', { source: UTM_SOURCE });
        }
        bindForm.style.display = 'none';
        successBlock.classList.add('visible');
        setTimeout(() => { window.location.href = VIP_URL; }, 2500);
      } else {
        showError(data.message || '綁定失敗，請稍後再試');
        btnSubmit.disabled = false;
        btnSubmit.textContent = '確認綁定';
      }
    } catch (err) {
      console.error('Bind error:', err);
      showError('連線異常，請稍後再試');
      btnSubmit.disabled = false;
      btnSubmit.textContent = '確認綁定';
    }
  });

  emailInput.disabled = true;
  initLiff();
</script>

</body>
</html>
